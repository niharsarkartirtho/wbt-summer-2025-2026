<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Student Registration from</h1>
    <form action="#" method="post">
        <fieldset>
            <legend>Personal Information</legend>
            <label for="fullname">Full Name:</label>
            <input type="text" name="fullname" id="fullname" required> 
            <br>
            <br>

            <label for="sid">Student Id:</label>
            <input type="text" name="student id" id="sid" required> 
            <br>
            <br>

            <label for="email">Email Address:</label>
            <input type="text" name="email" id="email" required>
            <br>
            <br>

            <label for="Phone">Phone :</label>
            <input type="tel" name="Phone" id="Phone" required>
            <br>
            <br>

            <label for="Dob">DOB :</label>
            <input type="date" name="Dob" id="Dob" required>
            <br>
            <br> 
            
            <label for="Gender">Gender :</label>

            <input type="radio" name="Gender" id="male">
            <label for="male">Male</label>
            
            <input type="radio" name="Gender" id="female">
            <label for="female">Female</label>
            
            <input type="radio" name="Gender" id="other">
            <label for="other">Others</label>
            
            
        </fieldset>

        <br>

        <fieldset>
            <legend>Academic Information</legend>

            <label for="department">Department :</label>
            <select id = "department" name="department">
                <option value="CSE" selected>CSE</option>
                <option value="EEE">EEE</option>
                <option value="BBA">BBA</option>
                <option value="English">English</option>
                <option value="Civil">Civil Engineering</option>
            </select>
            <br>
            <br>

            <label for="semester">Semester :</label>
            <select id = "semester" name="semester">
                <option value="1st" selected>1st semester</option>
                <option value="2nd">2nd semester</option>
                <option value="3rd">3rd semester</option>
                <option value="4th">4th semester</option>
                <option value="5th">5th semester</option>
                <option value="6th">6th semester</option>
                <option value="7th">7th semester</option>
                <option value="8th">8th semester</option>
            </select>

        </fieldset>

        <br>

        <fieldset>
            <legend>Skills</legend>
            <label for="Skill">Select Programming language known :</label>

            <input type="checkbox" name="Skill" id="C">
            <label for="C">C</label>
            
            <input type="checkbox" name="Skill" id="cpp">
            <label for="cpp">C++</label>

            <input type="checkbox" name="Skill" id="java">
            <label for="java">Java</label>

            <input type="checkbox" name="Skill" id="python">
            <label for="python">Python</label>

            <input type="checkbox" name="Skill" id="js">
            <label for="js">Javascript</label>
            
        </fieldset>

        <br>

        <fieldset>
            <legend>Additional Information</legend>

            <textarea id="address" name="address" rows="4" cols="40" maxlength="200">Write your address</textarea>
            <br>
            
            <label for="photo">chose your photo :</label>
            <input type="file" name="photo" id="photo">
            <br>

            <label for="comment">Comment :</label>
            <br>
            <textarea id="comment" name="comment" rows="2" cols="70" maxlength="200">Comment</textarea>
        </fieldset>

        <br>
        <input type="submit" value="Submit">
        <input type="reset" value="Reset">
    </form>
    
</body>
</html>
